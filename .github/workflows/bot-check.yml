name: Bot CI

on:
  push:
    branches: [main]
    paths:
      - "telegram-bot/**"
  pull_request:
    branches: [main]
    paths:
      - "telegram-bot/**"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-bot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py bot.py api.py storage.py
